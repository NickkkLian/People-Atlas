<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人力资源 · People Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* 私人名录风：暖纸底 + 墨字 + 三类人各自的印章色 */
:root{
  --paper:#f6f3ec; --paper2:#efe9dd; --card:#fffdf8;
  --ink:#2b2620; --ink2:#6b6255; --ink3:#a39a8a; --line:#e2dacb; --line2:#cfc4ae;
  --friend:#b4524b;   /* 朋友 · 印泥红 */
  --work:#43617d;     /* 工作 · 靛青 */
  --venture:#a2762c;  /* 创业 · 铜金 */
  --green:#4d7c54; --red:#b4524b;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans','Noto Sans SC',sans-serif; --serif:'Noto Serif SC',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 400px at 90% -8%, rgba(162,118,44,.06), transparent 60%)}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}
header{border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:rgba(246,243,236,.94);backdrop-filter:blur(8px)}
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:12px;flex-wrap:wrap}
.brand{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:1px}
.brand small{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:3px;display:block;margin-top:-3px}
.brand .seal{display:inline-block;width:12px;height:12px;background:var(--friend);border-radius:2px;margin-right:8px;transform:rotate(6deg)}
.tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--ink2)}
.iconbtn{background:none;border:1px solid var(--line2);color:var(--ink2);font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer}
.iconbtn:hover{color:var(--ink);border-color:var(--ink3)}
.sync{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;white-space:nowrap}
.sync .dot{width:7px;height:7px;border-radius:50%;background:var(--ink3)}
.sync.ok .dot{background:var(--green)} .sync.busy .dot{background:var(--venture);animation:pulse 1s infinite}
.sync.dirty .dot{background:var(--venture)} .sync.err .dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

nav.cats{display:flex;gap:0;border-bottom:none}
.cat-tab{background:none;border:none;font-family:var(--serif);font-size:15.5px;color:var(--ink2);padding:10px 18px;cursor:pointer;
  border-bottom:3px solid transparent;display:flex;align-items:center;gap:7px}
.cat-tab .n{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.cat-tab.active{color:var(--ink);border-bottom-color:var(--acc,var(--ink))}
.cat-tab:hover{color:var(--ink)}

main{padding:20px 0 80px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:9px 12px 9px 32px;font-size:14px;color:var(--ink);font-family:var(--sans)}
.search input:focus{outline:none;border-color:var(--ink3)}
.search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.4}
select.ctl{background:var(--card);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:9px 10px;font-size:13px;font-family:var(--sans);cursor:pointer}
.btn{background:var(--ink);color:var(--paper);border:none;font-family:var(--mono);font-size:12.5px;font-weight:500;padding:10px 16px;border-radius:8px;cursor:pointer;letter-spacing:.5px}
.btn:hover{opacity:.88}
.btn.ghost{background:none;color:var(--ink2);border:1px solid var(--line2)}
.btn.danger{background:var(--red)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px 12px;cursor:pointer;position:relative;
  transition:border-color .15s, transform .15s;border-top:3px solid var(--acc,var(--line2))}
.pcard:hover{border-color:var(--line2);transform:translateY(-1px)}
.pcard .nm{font-family:var(--serif);font-size:17.5px;font-weight:700;display:flex;align-items:baseline;gap:8px}
.pcard .score{margin-left:auto;font-family:var(--mono);font-size:15px;color:var(--acc)}
.pcard .score small{font-size:10px;color:var(--ink3)}
.pcard .meta{margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;font-size:11px;color:var(--ink2)}
.pill{border:1px solid var(--line);border-radius:5px;padding:1px 7px;background:var(--paper2);white-space:nowrap}
.pill.bday{border-color:#d8a24e;color:#9c6f27;background:rgba(162,118,44,.10);font-weight:500}
.pill.bday.today{border-color:var(--friend);color:var(--friend);background:rgba(180,82,75,.10)}
.pcard .snip{margin-top:8px;font-size:12.5px;color:var(--ink2);display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pcard .foot{margin-top:8px;font-family:var(--mono);font-size:10.5px;color:var(--ink3);display:flex;gap:10px}
.viewseg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.viewseg .seg{background:var(--card);border:none;color:var(--ink2);font-family:var(--sans);font-size:13px;padding:8px 12px;cursor:pointer}
.viewseg .seg.on{background:var(--ink);color:var(--paper)}
.viewseg .seg+.seg{border-left:1px solid var(--line2)}
.rankcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;border-top:3px solid var(--acc)}
.rank-h{font-family:var(--serif);font-size:16px;font-weight:700;display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.rank-h small{font-family:var(--mono);font-size:10px;color:var(--ink3);font-weight:400}
.rank-h .rc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink3);border:1px solid var(--line);border-radius:10px;padding:0 7px}
.rlist{list-style:none;margin:0;padding:0}
.rrow{display:grid;grid-template-columns:26px 1fr 60px 34px;align-items:center;gap:8px;padding:5px 0;cursor:pointer;border-bottom:1px dashed var(--line)}
.rrow:last-child{border-bottom:none}
.rrow:hover .rn{color:var(--acc)}
.rrow .rk{font-size:15px;text-align:center}
.rrow .rk .ri{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.rrow .rn{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rrow .rbar{height:6px;background:var(--paper2);border-radius:4px;overflow:hidden;border:1px solid var(--line)}
.rrow .rbar i{display:block;height:100%;background:var(--acc);opacity:.75}
.rrow .rs{font-family:var(--mono);font-size:13px;text-align:right;color:var(--acc)}
.rempty{color:var(--ink3);font-size:12.5px;padding:6px 0;font-family:var(--mono)}
.empty{grid-column:1/-1;text-align:center;color:var(--ink3);padding:60px 20px;font-family:var(--serif);font-size:15px;line-height:2.2}
.empty .big{font-size:34px}

/* 抽屉编辑 */
.overlay{position:fixed;inset:0;background:rgba(43,38,32,.35);z-index:50;display:none}
.overlay.on{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(680px,100%);background:var(--paper);z-index:51;border-left:1px solid var(--line2);
  transform:translateX(102%);transition:transform .22s ease;display:flex;flex-direction:column}
.drawer.on{transform:none}
.dr-h{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.dr-h .cat-seal{font-family:var(--mono);font-size:10.5px;color:#fff;background:var(--acc);padding:2px 8px;border-radius:4px}
.dr-h .sc{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--acc)}
.dr-body{flex:1;overflow-y:auto;padding:18px 20px 40px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.8px;color:var(--ink2);margin-bottom:5px;text-transform:uppercase}
.field input,.field textarea{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--ink);font-family:var(--sans)}
.field textarea{resize:vertical;min-height:64px;line-height:1.65}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--ink3)}
.field .hint{font-size:11px;color:var(--ink3);margin-top:4px;font-family:var(--mono)}
.name-in{font-family:var(--serif) !important;font-size:20px !important;font-weight:700}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.two{grid-template-columns:1fr}}

.dims{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.dims h4{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--ink2);margin-bottom:10px;display:flex;align-items:baseline}
.dims h4 .total{margin-left:auto;font-size:15px;color:var(--acc)}
.dim-row{display:grid;grid-template-columns:110px 1fr 46px 20px;gap:10px;align-items:center;padding:5px 0}
.dim-row .dn{font-size:13px;color:var(--ink)}
.dim-row .dn small{color:var(--ink3);font-family:var(--mono);font-size:10px}
.dim-row input[type=range]{width:100%;accent-color:var(--acc)}
.dim-row .dv{font-family:var(--mono);font-size:13px;text-align:right;color:var(--acc)}
.dim-row .dv.unset{color:var(--ink3)}
.dim-row .dx{color:var(--ink3);cursor:pointer;font-size:12px;text-align:center;visibility:hidden}
.dim-row:hover .dx{visibility:visible}
.tagbox{display:flex;gap:6px;flex-wrap:wrap;align-items:center;background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:7px 9px}
.tagchip{background:var(--paper2);border:1px solid var(--line);border-radius:5px;padding:1px 8px;font-size:12px}
.tagchip b{cursor:pointer;color:var(--ink3);font-weight:400;margin-left:3px}
.tagbox input{border:none;background:none;flex:1;min-width:90px;font-size:13px;color:var(--ink);padding:2px}
.tagbox input:focus{outline:none}
.dr-foot{display:flex;gap:10px;padding:12px 20px;border-top:1px solid var(--line)}

/* 设置 & 通用模态 */
.modal-ov{position:fixed;inset:0;background:rgba(43,38,32,.4);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:46px 16px;overflow-y:auto}
.modal-ov.on{display:flex}
.modal{background:var(--paper);border:1px solid var(--line2);border-radius:12px;width:100%;max-width:560px;box-shadow:0 24px 60px rgba(43,38,32,.25)}
.modal h3{font-family:var(--serif);font-size:17px;padding:16px 20px;border-bottom:1px solid var(--line);display:flex}
.modal h3 .x{margin-left:auto;cursor:pointer;color:var(--ink3);font-family:var(--sans);font-weight:400}
.modal .mb{padding:16px 20px}
.modal .mf{padding:12px 20px 16px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--line)}
.dim-edit{display:grid;grid-template-columns:1fr 64px 28px;gap:8px;margin-bottom:7px;align-items:center}
.dim-edit input{background:var(--card);border:1px solid var(--line2);border-radius:6px;padding:6px 9px;font-size:13px;color:var(--ink)}
.dim-edit .del{color:var(--red);cursor:pointer;text-align:center;font-size:13px}
.acc-h{font-family:var(--serif);font-size:14.5px;font-weight:700;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.acc-h .seal{width:9px;height:9px;border-radius:2px;transform:rotate(6deg)}
.privnote{font-family:var(--mono);font-size:10.5px;color:var(--ink3);line-height:1.7;border-top:1px dashed var(--line2);margin-top:14px;padding-top:10px}
footer{border-top:1px solid var(--line);padding:16px 0 28px;text-align:center;color:var(--ink3);font-family:var(--mono);font-size:10.5px;letter-spacing:.5px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:12px;padding:10px 18px;border-radius:8px;z-index:80;transition:transform .25s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
@media(max-width:640px){.cat-tab{padding:10px 10px;font-size:14px}.grid{grid-template-columns:1fr}}

/* 深读档案 & AI 蒸馏 */
.modal.wide{max-width:840px}
.dsec{margin-bottom:20px}
.dsec-h{font-family:var(--serif);font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0 0 9px}
.dsec-h .cnt{font-family:var(--mono);font-size:10.5px;color:var(--ink3);border:1px solid var(--line);border-radius:10px;padding:0 7px}
.dsec-h .add{margin-left:auto}
.asp{margin-bottom:11px}
.asp .al{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.asp .al input{flex:1;background:none;border:none;font-family:var(--mono);font-size:10.5px;letter-spacing:.6px;color:var(--ink2);text-transform:uppercase;padding:2px 0}
.asp .al input:focus{outline:none;color:var(--ink)}
.asp .al .del{color:var(--ink3);cursor:pointer;font-size:12px;visibility:hidden}
.asp:hover .al .del{visibility:visible}
.asp textarea{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:8px 10px;font-size:13.5px;color:var(--ink);font-family:var(--sans);resize:vertical;min-height:52px;line-height:1.65}
.asp textarea:focus{outline:none;border-color:var(--ink3)}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:9px;position:relative}
.dcard .dtop{display:flex;gap:8px;align-items:center;margin-bottom:5px}
.dcard .dtop input.topic{flex:1;background:none;border:none;font-family:var(--serif);font-size:14.5px;font-weight:700;color:var(--ink);padding:2px 0}
.dcard .dtop input.dt{width:110px;background:none;border:none;font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:right}
.dcard input:focus,.dcard textarea:focus{outline:none}
.dcard textarea{width:100%;background:none;border:none;border-top:1px dashed var(--line);padding:6px 0 0;font-size:13.5px;color:var(--ink2);font-family:var(--sans);resize:vertical;min-height:40px;line-height:1.65}
.dcard textarea.quote{border-top:none;background:var(--paper2);border-left:2px solid var(--acc,var(--line2));border-radius:0 6px 6px 0;padding:5px 9px;margin-top:6px;font-size:13px;color:var(--ink);font-family:var(--serif);font-style:italic;min-height:32px}
.dcard textarea.qtext{border-top:none;background:var(--paper2);border-left:3px solid var(--friend);border-radius:0 6px 6px 0;padding:7px 10px;font-family:var(--serif);font-size:14px;color:var(--ink);min-height:40px;line-height:1.7}
.dcard .del{position:absolute;top:8px;right:9px;color:var(--ink3);cursor:pointer;font-size:12px;visibility:hidden;z-index:2}
.dcard:hover .del{visibility:visible}
.dempty{color:var(--ink3);font-size:12.5px;font-family:var(--mono);padding:2px 0 8px}
.distill-ta{width:100%;min-height:190px;background:var(--card);border:1px solid var(--line2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--ink);font-family:var(--sans);line-height:1.6;resize:vertical}
.distill-ta:focus{outline:none;border-color:var(--ink3)}
.dres{border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin-top:12px;background:var(--card);max-height:320px;overflow-y:auto}
.dres .rl{font-size:12.5px;color:var(--ink2);margin:2px 0 9px;line-height:1.6}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top">
      <div class="brand"><span class="seal"></span><span data-i18n="brand">人力资源</span><small>PEOPLE ATLAS · PRIVATE</small></div>
      <div class="tools">
        <span class="sync" id="sync"><span class="dot"></span><span id="sync-t" data-i18n="notConf">未配置</span></span>
        <button class="iconbtn" onclick="manualSync()" data-i18n="syncBtn">⟳ 同步</button>
        <button class="iconbtn" id="langBtn" onclick="toggleLang()">EN</button>
        <button class="iconbtn" onclick="openSettings()" data-i18n="setBtn">⚙ 设置</button>
      </div>
    </div>
    <nav class="cats" id="cats"></nav>
  </div>
</header>

<main class="wrap">
  <div class="controls">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" data-i18n-ph="searchPh" placeholder="搜索姓名 / 标签 / 来源 / 侧写 / 备注…">
    </div>
    <div class="viewseg" id="viewseg">
      <button class="seg${''}" data-view="list" onclick="setView('list')" data-i18n="v_list">☰ 名录</button>
      <button class="seg" data-view="rank" onclick="setView('rank')" data-i18n="v_rank">🏆 排行榜</button>
    </div>
    <select class="ctl" id="sortsel">
      <option value="score" data-i18n="s_score">按综合分</option>
      <option value="updated" data-i18n="s_updated">按最近更新</option>
      <option value="last" data-i18n="s_last">按上次联系</option>
      <option value="name" data-i18n="s_name">按姓名</option>
    </select>
    <button class="btn" id="addBtn" onclick="addPerson()">＋ <span data-i18n="addBtn">添加</span></button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- 抽屉编辑 -->
<div class="overlay" id="ov" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>

<!-- 设置模态 -->
<div class="modal-ov" id="set-ov">
  <div class="modal">
    <h3><span data-i18n="setTitle">⚙ 设置</span><span class="x" onclick="closeSettings()">✕</span></h3>
    <div class="mb" id="set-body"></div>
    <div class="mf">
      <button class="btn ghost" onclick="exportBackup()" data-i18n="exportBtn">⬇ 导出备份</button>
      <button class="btn" onclick="closeSettings()" data-i18n="doneBtn">完成</button>
    </div>
  </div>
</div>

<!-- 深读档案 -->
<div class="modal-ov" id="dossier-ov">
  <div class="modal wide">
    <h3>📖 <span data-i18n="dossierTitle">深读</span> · <span id="dossier-name" style="font-family:var(--serif)"></span>
      <button class="iconbtn" style="margin-left:12px" onclick="openDistill()">🧪 <span data-i18n="distillBtn">从聊天记录蒸馏</span></button>
      <span class="x" onclick="closeDossier()">✕</span></h3>
    <div class="mb" id="dossier-body" style="max-height:70vh;overflow-y:auto"></div>
    <div class="mf">
      <span class="privnote" style="flex:1;margin:0;border:none;padding:0" data-i18n="dossierPriv">🔒 纯私有 · 只存你的私有仓库 · 绝无公开导出</span>
      <button class="btn ghost" onclick="exportPersonMd(dossierId)"><span data-i18n="exportMdBtn">⬇ 导出 Markdown</span></button>
      <button class="btn" onclick="closeDossier()" data-i18n="doneBtn">完成</button></div>
  </div>
</div>
<!-- 蒸馏聊天记录 -->
<div class="modal-ov" id="distill-ov">
  <div class="modal">
    <h3>🧪 <span data-i18n="distillTitle">从聊天记录蒸馏</span><span class="x" onclick="closeDistill()">✕</span></h3>
    <div class="mb">
      <div class="hint" style="margin-bottom:9px;line-height:1.7" data-i18n="distillHint"></div>
      <textarea class="distill-ta" id="distill-in"></textarea>
      <div class="hint" id="distill-err" style="color:var(--red);margin-top:6px"></div>
      <div class="dres" id="distill-res" style="display:none"></div>
    </div>
    <div class="mf">
      <button class="btn ghost" onclick="closeDistill()" data-i18n="closeBtn">关闭</button>
      <button class="btn" id="distill-run" onclick="runDistill()">🧪 <span data-i18n="distillGo">蒸馏</span></button></div>
  </div>
</div>

<footer data-i18n="foot">纯私人名录 · 数据只存私有仓库 · 本库无任何公开展示/导出到公开仓库的功能</footer>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   人力资源（People Atlas）：朋友 / 工作人脉 / 创业人脉 三类分开管理。

function b64e(str){const b=new TextEncoder().encode(str);let s='';for(let i=0;i<b.length;i+=0x8000)s+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000));return btoa(s);}
function b64d(b64){const bin=atob(String(b64).replace(/\s/g,''));const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return new TextDecoder().decode(b);}
function setSync(state,txt){const el=$('sync');el.className='sync '+state;$('sync-t').textContent=txt;}

/* ============ 配置 & 数据规整 ============ */
function loadCfg(){
  try{const c=JSON.parse(localStorage.getItem(PHA_KEY)||'null');if(c)cfg=Object.assign(cfg,{owner:c.owner||cfg.owner,repo:c.repo||cfg.repo,token:c.token||''});}catch(e){}
}
function configured(){return !!(cfg.owner&&cfg.repo&&cfg.token);}
function normalize(d){
  d=d&&typeof d==='object'?d:{};
  const dd=defaultDims();
  const dims={};
  CAT_KEYS.forEach(k=>{
    const arr=Array.isArray(d.dims&&d.dims[k])?d.dims[k]:dd[k];
    dims[k]=arr.filter(x=>x&&x.name!=null).map(x=>({id:x.id||uid(),name:String(x.name),weight:(+x.weight>0?+x.weight:1)}));
  });
  const people=(Array.isArray(d.people)?d.people:[]).map(p=>({
    id:p.id||uid(), cat:CAT_KEYS.includes(p.cat)?p.cat:'friends',
    name:String(p.name||''), scores:(p.scores&&typeof p.scores==='object')?p.scores:{},
    contact:p.contact||'', source:p.source||'', profile:p.profile||'', notes:p.notes||'',
    tags:Array.isArray(p.tags)?p.tags.filter(t=>typeof t==='string'):[],
    lastContact:p.lastContact||'', birthday:typeof p.birthday==='string'?p.birthday:'',
    character:Array.isArray(p.character)?p.character.filter(x=>x&&typeof x==='object').map(x=>({id:x.id||uid(),label:String(x.label||''),text:String(x.text||'')})):[],
    essence:Array.isArray(p.essence)?p.essence.filter(x=>x&&typeof x==='object').map(x=>({id:x.id||uid(),topic:String(x.topic||''),text:String(x.text||''),quote:String(x.quote||''),date:String(x.date||''),createdAt:x.createdAt||new Date().toISOString()})):[],
    quotes:Array.isArray(p.quotes)?p.quotes.filter(x=>x&&typeof x==='object').map(x=>({id:x.id||uid(),text:String(x.text||''),context:String(x.context||''),date:String(x.date||''),createdAt:x.createdAt||new Date().toISOString()})):[],
    createdAt:p.createdAt||new Date().toISOString(), updatedAt:p.updatedAt||new Date().toISOString(),
  }));
  return {version:1, updatedAt:d.updatedAt||null, dims, people};
}
function cache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data,fileSha}));}catch(e){}}
function loadCache(){try{const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'null');if(c){data=normalize(c.data);fileSha=c.fileSha||null;}}catch(e){}}

/* ============ GitHub 同步（私有库 people.json；sha 冲突自动取新重试） ============ */
function ghUrl(){return `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${DATA_PATH}`;}
function ghHeaders(){return {Authorization:'Bearer '+cfg.token,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};}
async function ghPull(){
  if(!configured()){setSync('idle',T('未配置','Not set'));return;}
  setSync('busy',T('拉取中…','Pulling…'));
  try{
    const r=await fetch(ghUrl()+'?t='+Date.now(),{headers:ghHeaders(),cache:'no-store'});
    if(r.status===404){fileSha=null;setSync('ok',T('已连接 · 待创建','Connected · new'));cache();renderAll();return;}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    fileSha=j.sha; data=normalize(JSON.parse(b64d(j.content)));
    cache();renderAll();setSync('ok',T('已同步','Synced'));
  }catch(e){setSync('err',T('拉取失败','Pull failed'));toast(T('拉取失败：','Pull failed: ')+e.message,true);}
}
async function ghPush(silent){
  if(!configured()){setSync('idle',T('未配置（本地）','Local only'));return;}
  if(saving)return; saving=true;
  setSync('busy',T('同步中…','Syncing…'));
  data.updatedAt=new Date().toISOString();
  const body={message:'people: update '+data.updatedAt.slice(0,16),content:b64e(JSON.stringify(data,null,2))};
  if(fileSha)body.sha=fileSha;
  try{
    let r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.status===409||r.status===422){  // sha 过期：取最新重试一次
      const cur=await fetch(ghUrl()+'?t='+Date.now(),{headers:ghHeaders(),cache:'no-store'});
      if(cur.ok){fileSha=(await cur.json()).sha;body.sha=fileSha;}
      r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
    }
    if(!r.ok)throw new Error('HTTP '+r.status);
    fileSha=(await r.json()).content.sha; dirty=false;
    cache();setSync('ok',T('已同步','Synced'));if(!silent)toast(T('已同步到私有仓库','Synced to private repo'));
  }catch(e){setSync('err',T('同步失败','Sync failed'));toast(T('同步失败：','Sync failed: ')+e.message,true);}
  finally{saving=false;}
}
function markDirty(){dirty=true;cache();setSync('dirty',T('待同步…','Pending…'));clearTimeout(saveTimer);if(configured())saveTimer=setTimeout(()=>ghPush(true),1800);}
async function manualSync(){ if(dirty) await ghPush(false); else await ghPull(); }

/* ============ 打分 ============ */
function dimsOf(cat){return data.dims[cat]||[];}
function scoreOf(p){
  const dims=dimsOf(p.cat);let sw=0,acc=0;
  dims.forEach(d=>{const v=p.scores[d.id];if(typeof v==='number'&&!isNaN(v)){acc+=v*d.weight;sw+=d.weight;}});
  if(!sw)return null;
  return Math.round(acc/sw*10)/10;
}

/* ============ 生日：解析 MM-DD 或 YYYY-MM-DD（年份可选），算下一次生日倒计时 ============ */
function parseBday(s){
  s=(s||'').trim(); if(!s)return null;
  let m=s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})$/), year=null,mon,day;
  if(m){year=+m[1];mon=+m[2];day=+m[3];}
  else{ m=s.match(/^(\d{1,2})[-/.](\d{1,2})$/); if(!m)return null; mon=+m[1];day=+m[2]; }
  if(mon<1||mon>12||day<1||day>31)return null;
  return {year,mon,day};
}
function bdayCanon(s){const b=parseBday(s);if(!b)return (s||'').trim();const mm=String(b.mon).padStart(2,'0'),dd=String(b.day).padStart(2,'0');return b.year?`${b.year}-${mm}-${dd}`:`${mm}-${dd}`;}
function bdayInfo(s){
  const b=parseBday(s); if(!b)return null;
  const now=new Date(); now.setHours(0,0,0,0);
  let next=new Date(now.getFullYear(),b.mon-1,b.day); next.setHours(0,0,0,0);
  if(next<now) next=new Date(now.getFullYear()+1,b.mon-1,b.day);
  const days=Math.round((next-now)/86400000);
  return {days,age:b.year?next.getFullYear()-b.year:null,hasYear:b.year!=null};
}
function bdayHintText(s){
  if(!(s||'').trim())return '';
  const bi=bdayInfo(s);
  if(!bi)return T('格式：MM-DD 或 YYYY-MM-DD','Format: MM-DD or YYYY-MM-DD');
  const when=bi.days===0?T('🎂 就是今天！','🎂 today!'):T(`🎂 还有 ${bi.days} 天`,`🎂 in ${bi.days} day${bi.days>1?'s':''}`);
  const age=bi.age!=null?T(`（将满 ${bi.age} 岁）`,` · turning ${bi.age}`):'';
  return when+age;
}

/* ============ 渲染 ============ */
function renderAll(){renderCats();renderGrid();}
function renderCats(){
  $('cats').innerHTML=CAT_KEYS.map(k=>{
    const n=data.people.filter(p=>p.cat===k).length;
    return `<button class="cat-tab${ui.cat===k?' active':''}" style="--acc:${CATS[k].color}" onclick="setCat('${k}')">${esc(catLabel(k))} <span class="n">${n}</span></button>`;
  }).join('');
}
function setCat(k){ui.cat=k;renderAll();}
function filtered(){
  let list=data.people.filter(p=>p.cat===ui.cat);
  const q=ui.search.trim().toLowerCase();
  if(q)list=list.filter(p=>[p.name,p.source,p.profile,p.notes,p.contact,(p.tags||[]).join(' ')].join(' ').toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(ui.sort==='name')return (a.name||'').localeCompare(b.name||'','zh');
    if(ui.sort==='updated')return (b.updatedAt||'').localeCompare(a.updatedAt||'');
    if(ui.sort==='last')return (b.lastContact||'').localeCompare(a.lastContact||'');
    return (scoreOf(b)??-1)-(scoreOf(a)??-1);
  });
  return list;
}
function renderGrid(){
  if(ui.view==='rank'){renderRank();return;}
  const list=filtered();const c=CATS[ui.cat];
  if(!list.length){
    $('grid').innerHTML=`<div class="empty"><div class="big">☰</div>${
      data.people.filter(p=>p.cat===ui.cat).length
        ? T('没有匹配的结果','No matches')
        : T(`还没有${c.noun}。点右上「＋ 添加」建第一张人物卡。`,'Empty — click “+ Add” to create the first card.')
    }</div>`;
    return;
  }
  $('grid').innerHTML=list.map(p=>{
    const sc=scoreOf(p);
    const tags=(p.tags||[]).slice(0,3).map(t=>`<span class="pill">#${esc(t)}</span>`).join('');
    const src=p.source?`<span class="pill">📍 ${esc(p.source.slice(0,14))}</span>`:'';
    const ct=p.contact?`<span class="pill">☎</span>`:'';
    const bi=bdayInfo(p.birthday);
    const bd=(bi&&bi.days<=14)?`<span class="pill bday${bi.days===0?' today':''}">🎂 ${bi.days===0?T('今天','today'):T(bi.days+'天',bi.days+'d')}</span>`:'';
    const hasDossier=((p.character||[]).some(a=>a.text&&a.text.trim()))||(p.essence||[]).length||(p.quotes||[]).length;
    const dp=hasDossier?`<span class="pill" title="${T('已有深读档案','Has deep-read dossier')}">📖</span>`:'';
    const snip=(p.profile||p.notes||'').trim();
    return `<div class="pcard" style="--acc:${CATS[p.cat].color}" onclick="openDrawer('${p.id}')">
      <div class="nm">${esc(p.name||T('未命名','Unnamed'))}<span class="score">${sc==null?`<small>${T('未评','—')}</small>`:sc.toFixed(1)+'<small>/10</small>'}</span></div>
      <div class="meta">${bd}${dp}${src}${ct}${tags}</div>
      ${snip?`<div class="snip">${esc(snip)}</div>`:''}
      <div class="foot"><span>${T('更新','upd')} ${(p.updatedAt||'').slice(0,10)}</span>${p.lastContact?`<span>${T('联系','met')} ${esc(p.lastContact)}</span>`:''}</div>
    </div>`;
  }).join('');
}

function catPool(){
  let list=data.people.filter(p=>p.cat===ui.cat);
  const q=ui.search.trim().toLowerCase();
  if(q)list=list.filter(p=>[p.name,p.source,p.profile,p.notes,p.contact,(p.tags||[]).join(' ')].join(' ').toLowerCase().includes(q));
  return list;

function renderRank(){
  const dims=dimsOf(ui.cat), pool=catPool(), c=CATS[ui.cat];
  if(!dims.length){$('grid').innerHTML=`<div class="empty"><div class="big">🏆</div>${T('这个分类还没有维度，去 ⚙ 设置里添加。','No dimensions yet — add some in ⚙ Settings.')}</div>`;return;}
  const medal=i=>['🥇','🥈','🥉'][i]||`<span class="ri">${i+1}</span>`;
  const blocks=dims.map(d=>{
    const ranked=pool.filter(p=>typeof p.scores[d.id]==='number')
      .sort((a,b)=>b.scores[d.id]-a.scores[d.id] || (a.name||'').localeCompare(b.name||'','zh'));
    const rows=ranked.length? ranked.map((p,i)=>`
      <li class="rrow" onclick="openDrawer('${p.id}')">
        <span class="rk">${medal(i)}</span>
        <span class="rn">${esc(p.name||T('未命名','Unnamed'))}</span>
        <span class="rbar"><i style="width:${p.scores[d.id]*10}%"></i></span>
        <span class="rs">${p.scores[d.id]}</span>
      </li>`).join('')
      : `<li class="rempty">${T('还没人评这个维度','No one scored on this yet')}</li>`;
    return `<div class="rankcard" style="--acc:${c.color}">
      <div class="rank-h">${esc(d.name)} <small>×${d.weight}</small><span class="rc">${ranked.length}</span></div>
      <ol class="rlist">${rows}</ol>
    </div>`;
  }).join('');
  $('grid').innerHTML=blocks;
}

function bindDrawer(p){
  const upd=()=>{p.updatedAt=new Date().toISOString();markDirty();};
  $('p-name').oninput=e=>{p.name=e.target.value;upd();};
  $('p-cat').onchange=e=>{p.cat=e.target.value;upd();openDrawer(p.id);renderAll();};
  $('p-last').onchange=e=>{p.lastContact=e.target.value;upd();};
  const bday=$('p-birthday'), bhint=$('p-bday-hint');
  const showBhint=()=>{bhint.textContent=bdayHintText(bday.value);};
  bday.oninput=e=>{p.birthday=e.target.value;showBhint();upd();};
  bday.onblur=()=>{const c=bdayCanon(bday.value);if(c!==bday.value){bday.value=c;p.birthday=c;showBhint();markDirty();}};
  showBhint();
  $('p-contact').oninput=e=>{p.contact=e.target.value;upd();};
  $('p-source').oninput=e=>{p.source=e.target.value;upd();};
  $('p-profile').oninput=e=>{p.profile=e.target.value;upd();};
  $('p-notes').oninput=e=>{p.notes=e.target.value;upd();};
  // 打分滑块：拖动=评分；✕=清除该项
  document.querySelectorAll('#drawer input[type=range]').forEach(sl=>{
    sl.oninput=()=>{
      sl.removeAttribute('data-unset');
      p.scores[sl.dataset.dim]=+sl.value;
      const dv=document.querySelector(`[data-dv="${sl.dataset.dim}"]`);dv.textContent=sl.value;dv.classList.remove('unset');
      refreshScore(p);upd();
    };
  });
  document.querySelectorAll('#drawer [data-dx]').forEach(x=>{
    x.onclick=()=>{
      delete p.scores[x.dataset.dx];
      const sl=document.querySelector(`input[data-dim="${x.dataset.dx}"]`);sl.value=5;sl.setAttribute('data-unset','1');
      const dv=document.querySelector(`[data-dv="${x.dataset.dx}"]`);dv.textContent='—';dv.classList.add('unset');
      refreshScore(p);upd();
    };
  });
  // 标签
  const ti=$('tag-in');
  ti.onkeydown=e=>{
    if(e.key==='Enter'&&ti.value.trim()){
      const t=ti.value.trim().replace(/^#/,'');
      if(!p.tags.includes(t)){p.tags.push(t);upd();openDrawer(p.id);setTimeout(()=>$('tag-in').focus(),80);}
      ti.value='';
    }
  };
  document.querySelectorAll('#drawer [data-rmtag]').forEach(b=>{
    b.onclick=()=>{p.tags=p.tags.filter(t=>t!==b.dataset.rmtag);upd();openDrawer(p.id);};
  });
}
function refreshScore(p){
  const sc=scoreOf(p);
  $('dr-total').textContent=sc==null?'—':sc.toFixed(1);
  $('dr-sc').textContent=sc==null?T('未评分','Unscored'):T('综合 ','Score ')+sc.toFixed(1)+'/10';
}

/* ---- AI 蒸馏（浏览器直连 Anthropic，结构化 JSON 输出） ---- */
function openDistill(){
  if(!dossierId)return;distillResult=null;
  $('distill-in').value='';$('distill-in').placeholder=T('例：\n我：……\nTA：……\n（直接粘贴微信/其它聊天导出，越多越准）','Paste your chat log here…');
  $('distill-err').textContent='';const rb=$('distill-res');rb.style.display='none';rb.innerHTML='';
  $('distill-ov').classList.add('on');setTimeout(()=>$('distill-in').focus(),100);
}
function closeDistill(){$('distill-ov').classList.remove('on');}
const DISTILL_SCHEMA={type:'object',additionalProperties:false,properties:{
  character:{type:'array',items:{type:'object',additionalProperties:false,properties:{label:{type:'string'},text:{type:'string'}},required:['label','text']}},
  essence:{type:'array',items:{type:'object',additionalProperties:false,properties:{topic:{type:'string'},text:{type:'string'},quote:{type:'string'}},required:['topic','text','quote']}},
  quotes:{type:'array',items:{type:'object',additionalProperties:false,properties:{text:{type:'string'},context:{type:'string'}},required:['text','context']}}
},required:['character','essence','quotes']};
async function runDistill(){
  const p=person(dossierId);if(!p)return;
  const cfg=aiCfg(),errEl=$('distill-err'),txt=($('distill-in').value||'').trim();
  if(!cfg.key){errEl.textContent=T('请先在 ⚙ 设置里保存 Anthropic API Key','Save your Anthropic API key in ⚙ Settings first');return;}
  if(txt.length<20){errEl.textContent=T('请先粘贴一段聊天记录','Paste some chat first');return;}
  const btn=$('distill-run'),old=btn.innerHTML;btn.disabled=true;btn.textContent=T('🧪 蒸馏中…','🧪 Distilling…');errEl.textContent='';
  const SYSTEM='你在帮我为一位朋友建立「深度档案」，用于纪念与未来的文学创作。下面是我和这位朋友的聊天记录。请蒸馏出三部分，以 JSON 返回：\n'+
    '1) character：人物特质数组，每项 {label, text}。至少覆盖「性格特质」「说话方式」「观念·价值观」三个 label；可再补你发现的其它显著维度（如幽默感、处事方式、在意什么…）。text 用简体中文，具体、有细节、贴合聊天中的真实表现，避免空泛套话。\n'+
    '2) essence：我们探讨过的、有思想或情感价值的交流，数组，每项 {topic 主题, text 精华提炼, quote 最能代表的一句原话（没有就空字符串）}。挑真正有价值的，别记流水账。\n'+
    '3) quotes：值得逐字保留的金句/名场面原话，数组，每项 {text 逐字原话, context 简短情境（没有就空字符串）}。只挑有味道、有代表性的。\n'+
    '只返回 JSON，不要任何解释文字。某部分确实没有就返回空数组。';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:cfg.model||'claude-opus-4-8',max_tokens:8000,system:SYSTEM,messages:[{role:'user',content:txt.slice(0,120000)}],output_config:{format:{type:'json_schema',schema:DISTILL_SCHEMA}}})});
    if(r.status===401)throw new Error(T('API Key 无效 (401)','Invalid API key (401)'));
    if(r.status===429)throw new Error(T('频率限制 (429)，稍后再试','Rate limited (429)'));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.stop_reason==='refusal')throw new Error(T('模型拒绝了该请求','The model refused'));
    const tb=(j.content||[]).find(b=>b.type==='text');if(!tb)throw new Error(T('未返回内容','Empty response'));
    let obj;try{obj=JSON.parse(tb.text);}catch(e){throw new Error(T('返回格式无法解析','Could not parse response'));}
    distillResult={character:Array.isArray(obj.character)?obj.character:[],essence:Array.isArray(obj.essence)?obj.essence:[],quotes:Array.isArray(obj.quotes)?obj.quotes:[]};
    renderDistillResult();
  }catch(e){errEl.textContent=T('蒸馏失败：','Distill failed: ')+e.message;}
  finally{btn.disabled=false;btn.innerHTML=old;}
}
function renderDistillResult(){
  const d=distillResult,box=$('distill-res'),n=d.character.length+d.essence.length+d.quotes.length;
  box.style.display='';
  box.innerHTML=`<b style="font-family:var(--serif)">${T('蒸馏结果','Result')}</b> <span style="font-family:var(--mono);font-size:11px;color:var(--ink3)">${T('人物特质','traits')} ${d.character.length} · ${T('探讨精华','essence')} ${d.essence.length} · ${T('金句','quotes')} ${d.quotes.length}</span>
    <div style="margin-top:8px">
    ${d.character.map(a=>`<div class="rl"><b style="font-size:12px;font-family:var(--serif)">${esc(a.label)}</b><br>${esc(a.text)}</div>`).join('')}
    ${d.essence.map(e=>`<div class="rl"><b style="font-size:12px;font-family:var(--serif)">💬 ${esc(e.topic)}</b><br>${esc(e.text)}${e.quote?`<br><i style="color:var(--ink3)">「${esc(e.quote)}」</i>`:''}</div>`).join('')}
    ${d.quotes.map(q=>`<div class="rl">❝ ${esc(q.text)}${q.context?` <span style="color:var(--ink3)">— ${esc(q.context)}</span>`:''}</div>`).join('')}
    </div>
    ${n?`<div style="margin-top:8px;text-align:right"><button class="btn" onclick="adoptDistill()">${T('采纳到档案 ↓','Merge into dossier ↓')}</button></div>`:`<div class="dempty">${T('没有提取到内容','Nothing extracted')}</div>`}`;
}
function adoptDistill(){
  const p=person(dossierId),d=distillResult;if(!p||!d)return;
  const asp=charAspects(p);
  d.character.forEach(a=>{const ex=asp.find(x=>x.label===a.label);if(ex){ex.text=ex.text.trim()?ex.text.trim()+'\n\n'+(a.text||''):(a.text||'');}else asp.push({id:uid(),label:a.label||T('特质','Trait'),text:a.text||''});});
  const now=new Date().toISOString();
  d.essence.forEach(e=>p.essence.unshift({id:uid(),topic:e.topic||'',text:e.text||'',quote:e.quote||'',date:'',createdAt:now}));
  d.quotes.forEach(q=>p.quotes.unshift({id:uid(),text:q.text||'',context:q.context||'',date:'',createdAt:now}));
  p.updatedAt=now;markDirty();distillResult=null;closeDistill();renderDossier();
  toast(T('已采纳到档案（可继续手动编辑）','Merged into dossier'));
}
/* ---- 导出单人档案为 Markdown（拿去写作用） ---- */
function personMd(p){
  const L=[], nm=p.name||T('未命名','Unnamed'), sc=scoreOf(p);
  L.push('# '+nm);
  const head=[catLabel(p.cat)];
  if(sc!=null)head.push(T('综合','Score')+' '+sc.toFixed(1)+'/10');
  if(p.birthday)head.push(T('生日','Birthday')+' '+p.birthday);
  if(p.lastContact)head.push(T('上次联系','Last contact')+' '+p.lastContact);
  L.push('','> '+head.join(' · '));
  if(p.source)L.push('','**'+T('来源','Source')+'**：'+p.source);
  if(p.contact)L.push('','**'+T('联系方式','Contact')+'**：'+p.contact);
  if((p.tags||[]).length)L.push('','**'+T('标签','Tags')+'**：'+p.tags.map(t=>'#'+t).join(' '));
  const scored=dimsOf(p.cat).filter(d=>typeof p.scores[d.id]==='number');
  if(scored.length)L.push('','**'+T('评分','Scores')+'**：'+scored.map(d=>d.name+' '+p.scores[d.id]).join(' · '));
  if((p.profile||'').trim())L.push('','## '+T('人物侧写','Profile'),'',p.profile.trim());
  if((p.notes||'').trim())L.push('','## '+T('备注','Notes'),'',p.notes.trim());
  const aspects=(p.character||[]).filter(a=>(a.text||'').trim());
  if(aspects.length){L.push('','---','','## 🧬 '+T('人物蒸馏','Character'));aspects.forEach(a=>{L.push('','### '+(a.label||''),'',a.text.trim());});}
  const ess=(p.essence||[]).filter(e=>(e.topic||'').trim()||(e.text||'').trim()||(e.quote||'').trim());
  if(ess.length){L.push('','## 💬 '+T('探讨精华','Discussion essence'));ess.forEach(e=>{const h=[(e.topic||'').trim()||T('（无题）','(untitled)')];if(e.date)h.push(e.date);L.push('','### '+h.join(' · '));if((e.text||'').trim())L.push('',e.text.trim());if((e.quote||'').trim())L.push('','> 「'+e.quote.trim()+'」');});}
  const qs=(p.quotes||[]).filter(q=>(q.text||'').trim());
  if(qs.length){L.push('','## ❝ '+T('金句·原话','Verbatim quotes'));qs.forEach(q=>{L.push('','> '+q.text.trim().replace(/\n/g,'\n> '));const meta=[(q.context||'').trim(),(q.date||'').trim()].filter(Boolean).join(' · ');if(meta)L.push('> — '+meta);});}
  L.push('','',`*${T('导出自 People Atlas','Exported from People Atlas')} · ${new Date().toISOString().slice(0,10)}*`);
  return L.join('\n');
}
function exportPersonMd(id){
  const p=person(id);if(!p)return;
  const nm=p.name||T('未命名','Unnamed');
  const blob=new Blob([personMd(p)],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=nm.replace(/[\/\\:*?"<>|]/g,'_')+'-'+T('档案','dossier')+'-'+new Date().toISOString().slice(0,10)+'.md';
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast(T('已导出 Markdown','Markdown exported'));
}

})();
